version: 1
steps:
  - id: binding
    title: Binding lab
    description: Experiment with the new reads/writes model and see store-driven widgets stay in sync inside one step.
    widgets:
      - type: text_output
        id: intro
        text: |
          Edit the source field and the mirror below will track the same store value.
          The object editor writes both the raw object and a derived `full` field.
      - type: text_input
        id: source_name
        label: Source name
        default: Ada Lovelace
        value: profile.name
      - type: text_input
        id: mirror_name
        label: Mirror name
        reads: profile.name
      - type: object_editor
        id: reviewer
        label: Reviewer object
        reads:
          name: "{{profile.name}}"
          email: "{{profile.name}}@example.com"
          team: research
        writes:
          review.author: value
          review.author.full: "{{value.name}} <{{value.email}}>"
      - type: text_input
        id: reviewer_full
        label: Derived full string
        reads: "Output: {{review.author.team}} {{review.author.full}}"
  - id: binding2
    title: Tag sync
    widgets:
      - type: text_output
        id: tags_intro
        text: |
          Edit the source tags in the array input.
          The select list uses those tags as dynamic options and stores its own selection in `profile.selected`.
      - type: array_input
        id: tags_text
        label: Available tags
        items: [rust, tui]
        value: profile.tags
      - type: select_list
        id: tags_picker
        label: Tags as picker
        mode: multi
        value: profile.selected
        options: profile.tags
      - type: text_input
        id: tags_summary
        label: Summary
        reads: "Available: {{profile.tags}} | Selected: {{profile.selected}}"
