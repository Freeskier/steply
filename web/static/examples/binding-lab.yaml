version: 1
steps:
  - id: binding
    title: Binding lab
    description: Experiment with the new reads/writes model and see store-driven widgets stay in sync inside one step.
    widgets:
      - type: text_output
        id: intro
        text: |
          Edit the source field and the mirror below will track the same store value.
          The object editor writes both the raw object and a derived `full` field.
      - type: text_input
        id: source_name
        label: Source name
        default: Ada Lovelace
        value: profile.name
      - type: text_input
        id: mirror_name
        label: Mirror name
        reads: profile.name
      - type: object_editor
        id: reviewer
        label: Reviewer object
        reads:
          name: "{{profile.name}}"
          email: "{{profile.name}}@example.com"
          team: research
        writes:
          review.author: value
          review.author.full: "{{value.name}} <{{value.email}}>"
      - type: text_input
        id: reviewer_full
        label: Derived full string
        reads: "Output: {{review.author.team}} {{review.author.full}}"
  - id: binding2
    title: File browser multi
    widgets:
      - type: text_output
        id: files_intro
        text: |
          The file browser starts with the modal open and supports multi selection.
          Selected files are stored in `profile.files`.
      - type: file_browser
        id: files_picker
        label: Choose files
        browser_mode: tree
        selection_mode: multi
        display_mode: relative
        value_mode: relative
        value: profile.files
      - type: text_input
        id: files_summary
        label: Summary
        reads: "Selected: {{profile.files}}"
      - type: select_list
        id: files_preview
        label: Selected files
        mode: multi
        options: profile.files
