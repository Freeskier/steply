version: 1
steps:
  - id: runner
    title: Command runner env
    widgets:
      - type: text_input
        id: name
        label: Name
        default: Ada
        value: profile.name

      - type: command_runner
        id: greet
        label: Generate greeting
        run_mode: manual
        commands:
          - label: Echo greeting
            program: bash
            args:
              - -lc
              - 'printf "hello %s" "$NAME"'
            env:
              NAME: "{{profile.name}}"
        writes:
          runner.stdout: stdout
          runner.stderr: stderr
          runner.exit_code: exit_code

      - type: text_output
        id: stdout_preview
        text: "Stdout: {{runner.stdout}}"

      - type: text_output
        id: stderr_preview
        text: "Stderr: {{runner.stderr}}"

      - type: text_output
        id: code_preview
        text: "Exit code: {{runner.exit_code}}"
