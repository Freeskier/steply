version: 1
steps:
  - id: map
    title: Repo compass
    description: Walk a codebase like a guided investigation instead of a random file hunt.
    widgets:
      - type: tree_view
        id: architecture
        label: Architecture map
        indent_guides: true
        max_visible: 7
        nodes:
          - item: apps
            depth: 0
            has_children: true
            expanded: true
          - item: apps/web
            depth: 1
            has_children: false
          - item: apps/ops-terminal
            depth: 1
            has_children: false
          - item: crates
            depth: 0
            has_children: true
            expanded: true
          - item: crates/steply-core
            depth: 1
            has_children: false
          - item: crates/steply-cli
            depth: 1
            has_children: false
          - item: infra
            depth: 0
            has_children: true
          - item: infra/cloudflare
            depth: 1
            has_children: false
      - type: file_browser
        id: candidate
        label: Candidate file
        cwd: .
        browser_mode: tree
        recursive: true
        hide_hidden: true
        ext_filter: [rs, ts, svelte, toml, yaml]
      - type: select_list
        id: triage_labels
        label: Triage labels
        mode: multi
        max_visible: 6
        options:
          - value: onboarding
            title: Onboarding drag
            description: A new contributor would trip here first.
          - value: release-risk
            title: Release risk
            description: Small mistakes here have production blast radius.
          - value: perf
            title: Perf pressure
            description: This path is likely to show up in hot loops.
          - value: design-debt
            title: Design debt
            description: The shape works now but is becoming expensive to extend.

  - id: synthesize
    title: Synthesize findings
    description: Capture a usable handoff, not just raw impressions.
    widgets:
      - type: table
        id: findings
        label: Findings
        initial_rows: 3
        row_numbers: true
        columns:
          - header: Area
            widget:
              type: text_input
              placeholder: widgets/file_browser
          - header: Severity
            widget:
              type: select
              options: [low, medium, high, critical]
          - header: Fix now
            widget:
              type: checkbox
      - type: textarea
        id: handoff
        min_height: 6
        max_height: 10
      - type: snippet
        id: title
        label: Issue title
        template: "[{{severity}}] {{area}} -> {{owner}}"
        inputs:
          - type: select
            id: severity
            label: Severity
            options: [low, medium, high, critical]
            default: high
          - type: text_input
            id: area
            label: Area
            default: crates/steply-core
          - type: text_input
            id: owner
            label: Owner
            default: runtime

  - id: close
    title: Close the loop
    description: Finish with one decisive operator move.
    widgets:
      - type: command_runner
        id: quick_checks
        label: Quick checks
        visible_lines: 10
        commands:
          - label: Render flow preview
            program: bash
            args:
              - -lc
              - |
                echo "[preview] loading schema"
                echo "[preview] rendering current step"
                echo "[preview] output stable"
          - label: Lint changed files
            program: bash
            args:
              - -lc
              - |
                echo "[lint] cargo fmt --check"
                echo "[lint] cargo clippy"
                echo "[lint] bun run check"
      - type: confirm_input
        id: ship_handoff
        label: Convert this investigation into work items?
