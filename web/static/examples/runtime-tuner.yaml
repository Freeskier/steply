version: 1
steps:
  - id: signals
    title: Runtime tuner
    description: Shape live behavior with outputs that react as you tune the knobs.
    widgets:
      - type: text_output
        id: intro
        text: "Use the sliders as if you were standing in front of a live runtime budget."
      - type: progress_output
        id: cpu_bar
        label: CPU headroom
        min: 0
        max: 100
        unit: "%"
        bar_width: 34
        style: block_classic
      - type: chart_output
        id: cpu_chart
        label: CPU history
        min: 0
        max: 100
        unit: "%"
        capacity: 36
        mode: braille
        gradient: true
      - type: slider
        id: cpu_input
        label: CPU load
        min: 0
        max: 100
        step: 5
        unit: "%"
        writes:
          cpu_bar: value
          cpu_chart: value
      - type: progress_output
        id: mem_bar
        label: Memory budget
        min: 0
        max: 100
        unit: " MB"
        bar_width: 34
        style: classic_line
      - type: slider
        id: mem_input
        label: Memory allocation
        min: 0
        max: 100
        step: 10
        unit: " MB"
        writes: mem_bar
      - type: color_input
        id: accent
        label: Accent color
        rgb: [255, 197, 61]

  - id: shape
    title: Queue shaping
    description: Choose the runtime profile and tune each worker lane.
    widgets:
      - type: select_list
        id: lanes
        label: Runtime lanes
        mode: multi
        max_visible: 5
        options:
          - value: low-latency
            title: Low latency
            description: Prioritize tail response time over throughput.
          - value: burst-absorb
            title: Burst absorb
            description: Favor queue elasticity for uneven traffic spikes.
          - value: cpu-tight
            title: CPU tight
            description: Keep compute budgets hard-capped under load.
          - value: fail-soft
            title: Fail soft
            description: Degrade gracefully instead of hard rejecting requests.
      - type: table
        id: worker_table
        label: Worker lanes
        row_numbers: true
        initial_rows: 3
        columns:
          - header: Queue
            widget:
              type: text_input
              placeholder: ingestion
          - header: Concurrency
            widget:
              type: slider
              min: 1
              max: 32
              step: 1
          - header: Timeout
            widget:
              type: masked_input
              mask: "#{1,4:1-9999}ms"
          - header: Guardrail
            widget:
              type: checkbox
      - type: textarea
        id: tuning_note
        min_height: 4
        max_height: 8

  - id: handoff
    title: Handoff
    description: End with a command the next operator can actually run.
    widgets:
      - type: snippet
        id: launch_cmd
        label: Runtime command
        template: "steply tune --profile {{profile}} --cpu {{cpu}} --mem {{mem}} --lanes '{{lanes_csv}}'"
        inputs:
          - type: select
            id: profile
            label: Profile
            options: [balanced, low-latency, burst-absorb, fail-soft]
            default: balanced
          - type: text_input
            id: cpu
            label: CPU target
            default: "65"
          - type: text_input
            id: mem
            label: Memory target
            default: "70"
          - type: text_input
            id: lanes_csv
            label: Lanes CSV
            default: low-latency,fail-soft
      - type: choice_input
        id: rollout_style
        label: Rollout style
        options: [shadow, staged, direct]
        bullets: true
      - type: confirm_input
        id: lock_it
        label: Freeze this tuning profile?
