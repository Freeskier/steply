version: 1

tasks:
  - id: normalize_customer_name
    kind: exec
    program: python3
    args:
      - -c
      - |
        import json
        import sys

        value = str(json.load(sys.stdin) or "")
        print(json.dumps(value.strip().title()))
    reads: "{{demo.customer_name}}"
    triggers:
      - type: store_changed
        ref: demo.customer_name
        debounce_ms: 250
    writes: demo.customer_name_pretty

  - id: estimate_monthly_cost
    kind: exec
    program: python3
    args:
      - -c
      - |
        import json
        import sys

        seats = int(float(json.load(sys.stdin) or 0))
        print(json.dumps(seats * 49))
    reads: "{{demo.seats}}"
    triggers:
      - type: store_changed
        ref: demo.seats
        debounce_ms: 250
    writes: demo.monthly_cost

  - id: build_handoff
    kind: exec
    program: python3
    args:
      - -c
      - |
        import json
        import sys

        payload = json.load(sys.stdin)
        customer = str(payload.get("customer") or "").strip() or "Unknown"
        seats = int(float(payload.get("seats") or 0))
        monthly_cost = int(float(payload.get("monthly_cost") or 0))
        tags = payload.get("tags") or []

        result = {
          "title": f"{customer} onboarding",
          "monthly_cost": monthly_cost,
          "brief": {
            "customer": customer,
            "seats": seats,
            "tags": tags,
          },
        }
        print(json.dumps(result))
    reads:
      customer: "{{demo.customer_name_pretty}}"
      seats: "{{demo.seats}}"
      monthly_cost: "{{demo.monthly_cost}}"
      tags: "{{demo.tags}}"
    triggers:
      - type: step_enter
        step_id: handoff
      - type: store_changed
        ref: demo.customer_name_pretty
        debounce_ms: 250
      - type: store_changed
        ref: demo.seats
        debounce_ms: 250
      - type: store_changed
        ref: demo.tags
        debounce_ms: 250
    writes:
      demo.generated_handoff: result

steps:
  - id: customer_name
    title: Customer Name
    description: Clean up a raw customer name before showing it in the UI.
    widgets:
      - type: text_output
        id: customer_name_intro
        text: 'Normalize "{{demo.customer_name}}" into a display name.'
      - type: text_input
        id: customer_name
        label: Raw customer name
        default: "  moonbase logistics  "
        value: demo.customer_name
      - type: text_output
        id: customer_name_result
        text: "Display name: {{demo.customer_name_pretty}}"

  - id: pricing
    title: Pricing
    description: Turn a seat count into a simple monthly estimate.
    widgets:
      - type: text_output
        id: pricing_intro
        text: 'Estimate cost from "{{demo.seats}}" seats.'
      - type: slider
        id: seats
        label: Seats
        min: 1
        max: 50
        step: 1
        default: 6
        value: demo.seats
      - type: text_output
        id: pricing_result
        text: "Monthly estimate: ${{demo.monthly_cost}}"

  - id: handoff
    title: Handoff
    description: Build a structured payload from prior task outputs and current tags.
    widgets:
      - type: text_output
        id: handoff_intro
        text: 'Task writes a generated payload to "{{demo.generated_handoff}}" while your notes stay separate.'
      - type: array_input
        id: tags
        label: Tags
        items:
          - priority
          - finance
          - onboarding
        value: demo.tags
      - type: text_output
        id: handoff_title
        text: "Title: {{demo.generated_handoff.title}}"
      - type: text_output
        id: handoff_cost
        text: "Cost: ${{demo.generated_handoff.monthly_cost}}"
      - type: text_output
        id: handoff_brief
        text: "Brief: {{demo.generated_handoff.brief.customer}} / {{demo.generated_handoff.brief.seats}} seats / {{demo.generated_handoff.brief.tags}}"
      - type: object_editor
        id: handoff_review
        label: Internal review notes
        default:
          owner: ops
          status: draft
          note: ""
        value: demo.handoff_review
