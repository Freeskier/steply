version: 1

tasks:
  - id: string_trimmed
    kind: exec
    program: python3
    args:
      - -c
      - |
        import json
        import sys

        value = str(json.load(sys.stdin) or "")
        print(json.dumps(value.strip().title()))
    reads: "{{demo.name}}"
    triggers:
      - type: store_changed
        ref: demo.name
        debounce_ms: 250
    writes: demo.name_pretty

  - id: number_double
    kind: exec
    program: python3
    args:
      - -c
      - |
        import json
        import sys

        value = json.load(sys.stdin)
        number = float(value or 0)
        print(json.dumps(number * 2))
    reads: "{{demo.count}}"
    triggers:
      - type: store_changed
        ref: demo.count
        debounce_ms: 250
    writes: demo.count_doubled

  - id: build_summary
    kind: exec
    program: python3
    args:
      - -c
      - |
        import json
        import sys

        payload = json.load(sys.stdin)
        name = str(payload.get("name") or "").strip() or "Unknown"
        count = int(float(payload.get("count") or 0))
        tags = payload.get("tags") or []

        result = {
          "headline": f"{name} x{count}",
          "tag_count": len(tags),
          "tags": tags,
          "card": {
            "name": name,
            "count": count,
            "tags": tags,
          },
        }
        print(json.dumps(result))
    reads:
      name: "{{demo.name}}"
      count: "{{demo.count}}"
      tags: "{{demo.tags}}"
    triggers:
      - type: step_enter
        step_id: structured
      - type: store_changed
        ref: demo.name
        debounce_ms: 250
      - type: store_changed
        ref: demo.count
        debounce_ms: 250
      - type: store_changed
        ref: demo.tags
        debounce_ms: 250
    writes:
      demo.summary: result

steps:
  - id: string
    title: String
    description: Scalar string goes into stdin as JSON and comes back as a JSON string.
    widgets:
      - type: text_output
        id: string_intro
        text: 'Task reads "{{demo.name}}" and returns a JSON string.'
      - type: text_input
        id: name
        label: Raw name
        default: "  moonbase report  "
        value: demo.name
      - type: text_output
        id: string_result
        text: "Pretty name: {{demo.name_pretty}}"

  - id: number
    title: Number
    description: Scalar number goes into stdin as JSON and comes back as a JSON number.
    widgets:
      - type: text_output
        id: number_intro
        text: 'Task reads "{{demo.count}}" and returns count * 2.'
      - type: slider
        id: count
        label: Count
        min: 0
        max: 20
        step: 1
        default: 4
        value: demo.count
      - type: text_output
        id: number_result
        text: "Doubled count: {{demo.count_doubled}}"

  - id: structured
    title: Structured
    description: Object with nested list goes into stdin as JSON and comes back as a JSON object.
    widgets:
      - type: text_output
        id: structured_intro
        text: 'Task reads { name, count, tags } as one JSON object and writes the whole result to "{{demo.summary}}".'
      - type: array_input
        id: tags
        label: Tags
        items:
          - urgent
          - lunar
          - archive
        value: demo.tags
      - type: text_output
        id: summary_headline
        text: "Headline: {{demo.summary.headline}}"
      - type: text_output
        id: summary_count
        text: "Card count: {{demo.summary.card.count}}"
      - type: text_output
        id: summary_tags
        text: "Card tags: {{demo.summary.card.tags}}"
      - type: object_editor
        id: summary_card
        label: Editable card
        default:
          name: Unknown
          count: 0
          tags: []
        value: demo.summary.card
