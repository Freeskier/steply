version: 1
steps:
  - id: intake
    title: Team kickoff studio
    description: Turn a kickoff call into a crisp operating package instead of loose notes.
    widgets:
      - type: text_input
        id: client_name
        label: Client name
        placeholder: Northwind Health
      - type: masked_input
        id: kickoff_code
        label: Kickoff code
        mask: "999-AAA"
      - type: calendar
        id: first_session
        label: First session
        mode: date_time
      - type: select
        id: engagement_model
        label: Engagement model
        options: [advisory, embedded, launch-sprint]
        default: embedded
      - type: checkbox
        id: executive_sponsor
        label: Executive sponsor aligned

  - id: shape
    title: Shape the work
    description: Define the moving parts of the engagement while the context is still fresh.
    widgets:
      - type: repeater
        id: workstreams
        label: Workstreams
        layout: stacked
        show_progress: true
        header_template: "workstream [{index}/{total}] -> {item}"
        items: [product-foundation, adoption-loop, launch-readiness]
        fields:
          - key: lead
            label: Lead
            widget:
              type: text_input
              placeholder: anna
          - key: cadence
            label: Cadence
            widget:
              type: select
              options: [daily, twice-weekly, weekly]
          - key: risk
            label: Risk
            widget:
              type: slider
              min: 1
              max: 10
              step: 1
      - type: textarea
        id: success_definition
        min_height: 5
        max_height: 9
      - type: select_list
        id: channels
        label: Communication channels
        mode: multi
        options: [slack, weekly-memo, figma-comments, loom-updates]

  - id: package
    title: Package it
    description: End with a command and an explicit go/no-go.
    widgets:
      - type: snippet
        id: kickoff_cmd
        label: Kickoff command
        template: "steply run --config {{path}} --client '{{client}}' --session '{{session}}'"
        inputs:
          - type: text_input
            id: path
            label: Config path
            default: ./flows/client-kickoff.yaml
          - type: text_input
            id: client
            label: Client slug
            default: northwind-health
          - type: text_input
            id: session
            label: Session id
            default: kickoff-01
      - type: table_output
        id: summary
        label: Kickoff defaults
        headers: [Track, Default]
        rows:
          - [Primary model, embedded]
          - [Update rhythm, weekly memo]
          - [Launch review, week 3]
      - type: confirm_input
        id: ready
        label: Freeze this kickoff package?
